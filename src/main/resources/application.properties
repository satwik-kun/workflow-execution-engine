spring.datasource.url=jdbc:h2:file:./data/workflow-db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.port=8080
workflow.execution.demo-mode=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [req:%X{requestId}] %logger{36} - %msg%n

app.security.user.employee.username=employee
app.security.user.employee.password=employee123
app.security.user.manager.username=manager
app.security.user.manager.password=manager123
app.security.user.operations.username=operations
app.security.user.operations.password=operations123
